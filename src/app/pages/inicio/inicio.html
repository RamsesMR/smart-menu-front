<div class="home-hero">
  <div class="hero-bg"></div>
  <div class="hero-spotlight"></div>

  <div class="content-wrapper">
    <header class="brand">
      <div class="logo-container">
        <h1 class="logo-text">Smart<span>Menu</span></h1>
      </div>
      <p class="subtitle">Descubre una nueva forma de pedir</p>
    </header>

    <nav class="actions">
      <button type="button" class="action-card ia-special" (click)="goToIA()">
        <div class="action-info">
          <h2 class="action-title">Menú Inteligente</h2>
          <p class="action-desc">Basado en tus objetivos de salud</p>
        </div>
      </button>

      <button type="button" class="action-card" (click)="goToBuild()">
        <div class="action-info">
          <h2 class="action-title">Carta Completa</h2>
          <p class="action-desc">Explora y gestiona tu pedido</p>
        </div>
      </button>
    </nav>
    <button
      type="button"
      class="fab-bell"
      (click)="openCallService()"
      aria-label="Llamar al servicio"
    >
      <span aria-hidden="true">🔔</span>
    </button>
  </div>

  @if (callModalOpen) {
    <div class="backdrop" (click)="closeCallService()"></div>
    <div class="modal">
      <h2 class="modal-title">¿Llamar al servicio?</h2>
      <p class="modal-desc">Avisaremos al camarero para que se acerque a tu mesa.</p>
      <div class="modal-actions">
        <button type="button" class="btn ghost" (click)="closeCallService()">Cancelar</button>
        <button type="button" class="btn primary" (click)="confirmCallService()">
          Llamar ahora
        </button>
      </div>
    </div>
  }

  @if (toastMsg()) {
    <div class="toast">{{ toastMsg() }}</div>
  }
</div>
